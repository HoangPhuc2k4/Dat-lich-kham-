name: dat_lich_kham
description: Ứng dụng đặt lịch khám bệnh (Mobile + Web) theo kiến trúc MVC.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  google_fonts: ^8.0.2
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  flutter_svg: ^2.0.17
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.19.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/

